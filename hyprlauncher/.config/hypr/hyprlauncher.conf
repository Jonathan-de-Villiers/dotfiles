general {
    # If true, the launcher will grab focus when opened
    grab_focus = true
}

ui {
    # Set the size of the launcher window (width height)
    window_size = 400 260
    # Rounding for the launcher window
    rounding = 10
}

finders {
    # Default finder to show on launch (e.g., desktop, math, unicode)
    default_finder = desktop
    # Show application icons
    desktop_icons = true
    # Prefix required to trigger math calculations
    math_prefix = =
    # Prefix required to trigger unicode/emoji search
    unicode_prefix = .
}
